name: Poland House Scraper Pipeline

on:
  schedule:
    - cron: '30 4 * * *'  # 4:30 AM UTC daily
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  scrape-and-enrich:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        python -m playwright install --with-deps chromium

    - name: Run Scraper
      run: python main_scraper.py

    - name: Run Data Enrichment
      run: python data_enrichment.py

    - name: Run Investment Analysis
      run: python investment_analysis.py

    - name: Run Score Generator
      run: python score_generator.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update property data: $(date +'%Y-%m-%d %H:%M')" && git push)
